# Bootstrap config — only for the first certificate issue.
# Use before SSL exists, then switch to spd-top.ru.conf
#
#   sudo cp deploy/nginx/spd-top.ru.http.conf /etc/nginx/sites-available/spd-top.ru
#   sudo ln -sf /etc/nginx/sites-available/spd-top.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name spd-top.ru www.spd-top.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
