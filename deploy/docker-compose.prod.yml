# Production compose — app only on localhost, nginx on the host terminates SSL.
# Copy to server as docker-compose.yml and set image tag / .env

name: spdtop

services:
  app:
    image: ghcr.io/koj10/spdtop:latest
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: https://spd-top.ru
    restart: unless-stopped
    volumes:
      - ./data:/data
